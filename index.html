<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Form</title>
  <style>
    body {
      font-family: serif;
      background: #f3f3f3;
      margin: 0;
      padding: 40px 60px;
      color: #111;
    }

    .form-wrap {
      max-width: 520px;
    }

    .field {
      margin: 0 0 36px 0;
    }

    label {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 390px;
      max-width: 100%;
      font-size: 22px;
      padding: 6px 10px;
      border: 2px solid #bdbdbd;
      box-sizing: border-box;
      background: #fff;
    }

    .buttons {
      margin-top: 18px;
      display: flex;
      gap: 12px;
    }

    button {
      font-size: 24px;
      padding: 8px 18px;
      border: 2px solid #bdbdbd;
      background: #efefef;
      cursor: pointer;
    }

    .answer {
      margin-top: 48px;
    }

    .answer h2 {
      color: #777;
      font-family: sans-serif;
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 10px 0;
    }

    .answer-line {
      border-top: 2px solid #cfcfcf;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="form-wrap">
    <form id="studentForm">
      <div class="field">
        <label for="firstName">First name:</label>
        <input id="firstName" name="firstName" type="text" value="En-Chia" />
      </div>

      <div class="field">
        <label for="lastName">Last name:</label>
        <input id="lastName" name="lastName" type="text" value="Chang" />
      </div>

      <div class="field">
        <label for="studentId">Student ID:</label>
        <input id="studentId" name="studentId" type="text" value="113403536" />
      </div>

      <div class="buttons">
        <button type="submit">Submit</button>
        <button type="reset">重設</button>
      </div>
    </form>

    <div class="answer">
      <h2>您的回答</h2>
      <div class="answer-line"></div>
    </div>
  </div>
</body>
</html>
